name: cjcrsg-bible-app
description: CJCRSG Bible App - Bible/Devotional/Bible Study tool
editor: nvim
tech:
  framework: react-native
  language: typescript
  runtime: expo

features:
  - Bible reading with multiple translations
  - Bookmarks and favorites
  - Highlights and notes
  - Search functionality
  - Devotional content
  - Reading plans
  - Cross-platform (iOS, Android, Web)

dependencies:
  expo: latest
  expo-router: latest
  expo-linking: latest
  expo-constants: latest
  expo-status-bar: latest
  "@react-native-async-storage/async-storage": latest
  expo-font: latest

devDependencies:
  typescript: ^5.0.0
  "@types/react": ~18.3.0

scripts:
  start: expo start
  android: expo run:android
  ios: expo run:ios
  web: expo start --web
  lint: eslint .
  typecheck: tsc --noEmit